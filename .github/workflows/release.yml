# Build and publish skillscan CLI (triggered on release)
name: release

on:
  release:
    types: [published]
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    if: github.event_name == 'release' && github.event.release
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Build sdist and wheel
        run: |
          pip install build
          python -m build
      - name: Verify install
        run: |
          pip install dist/*.whl
          skillscan --help >/dev/null
          skillscan demo --fixture allowed --output-dir /tmp/rel-demo
          test -f /tmp/rel-demo/report.json
      - name: Publish to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          pip install twine
          twine upload dist/*
