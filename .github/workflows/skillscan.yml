# SkillScan 官方工作流：固定路径 .github/workflows/skillscan.yml
# 这条文件路径会进入 attestation identity，服务端默认只信它。

name: skillscan

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches: [main]
  release:
    types: [published]
  workflow_dispatch: {}

permissions:
  contents: read
  id-token: write   # Sigstore keyless 需要 OIDC
  actions: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install skillscan
        run: pip install -e .
      - name: Run golden tests
        run: python tests/test_fixtures.py

  install-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install skillscan (non-editable)
        run: pip install .
      - name: Smoke test CLI
        run: |
          skillscan --help >/dev/null
          skillscan demo --fixture allowed --output-dir /tmp/demo-out
          test -f /tmp/demo-out/report.json

  scan:
    runs-on: ubuntu-latest
    needs: [test]
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install skillscan
        run: |
          pip install -e .
          skillscan --help >/dev/null

      - name: Run scan
        run: |
          skillscan scan . --format v1 --output-dir .
          test -f report.json

      - name: Validate report schema
        run: python scripts/validate_report_schema.py report.json

      - name: Create attestation (in-toto statement)
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_WORKFLOW_REF: ${{ github.server_url }}/${{ github.repository }}/.github/workflows/skillscan.yml@${{ github.ref }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_SHA: ${{ github.sha }}
        run: |
          REPORT_SHA256="$(sha256sum report.json | awk '{print $1}')"
          CLI_VER="$(python -c "from skillscan import __version__; print(__version__)")"
          RULESET_VER="$(python -c "import json; print(json.load(open('report.json'))['scanner']['ruleset_version'])")"
          cat > attestation.json <<EOF
          {
            "_type": "https://in-toto.io/Statement/v1",
            "subject": [
              {
                "name": "report.json",
                "digest": { "sha256": "${REPORT_SHA256}" }
              }
            ],
            "predicateType": "https://skillscan.dev/attestation/v1",
            "predicate": {
              "repo": "${GITHUB_REPOSITORY}",
              "workflow_ref": "${GITHUB_WORKFLOW_REF}",
              "run_id": "${GITHUB_RUN_ID}",
              "sha": "${GITHUB_SHA}",
              "cli_version": "${CLI_VER}",
              "ruleset_version": "${RULESET_VER}"
            }
          }
          EOF

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign attestation (keyless DSSE) and create bundle
        env:
          COSIGN_EXPERIMENTAL: "1"
        run: |
          cosign attest-blob --yes \
            --predicate attestation.json \
            --type "https://skillscan.dev/attestation/v1" \
            --bundle attestation.bundle \
            report.json

      - name: Upload to Skillscan Cloud
        env:
          SKILLSCAN_ENDPOINT: ${{ vars.SKILLSCAN_ENDPOINT || '' }}
          REPO_FULL_NAME: ${{ github.repository }}
        run: |
          if [ -z "${SKILLSCAN_ENDPOINT}" ]; then
            echo "SKILLSCAN_ENDPOINT not set; skipping upload. Verdict from report.json:"
            python -c "import json; print(json.load(open('report.json'))['verdict']['status'])"
            exit 0
          fi
          curl -fsSL -X POST "$SKILLSCAN_ENDPOINT" \
            -F "report=@report.json;type=application/json" \
            -F "attestation_bundle=@attestation.bundle" \
            -F "repo_full_name=${REPO_FULL_NAME}" \
            | tee skillscan_response.json

      - name: Print verdict
        run: |
          python - <<'PY'
          import json, os
          if os.path.isfile("skillscan_response.json"):
              r = json.load(open("skillscan_response.json"))
              print("Final verdict:", r.get("final_verdict"))
              print("Console:", r.get("console_url"))
              print("Share:", r.get("share_url"))
          else:
              r = json.load(open("report.json"))
              print("Verdict (local):", r.get("verdict", {}).get("status"))
          PY

      - name: Enforce gate
        run: |
          python - <<'PY'
          import json, sys
          if __import__("pathlib").Path("skillscan_response.json").exists():
              payload = json.load(open("skillscan_response.json"))
              status = payload.get("final_verdict") or (payload.get("verdict") or {}).get("status")
          else:
              payload = json.load(open("report.json"))
              status = (payload.get("verdict") or {}).get("status")
          print("Gate verdict:", status)
          if status == "blocked":
              sys.exit(1)
          PY